<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Garry's Gems — Games</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 80px 20px 64px;
    }
    .logo-wrap { display: inline-block; position: relative; }
    .logo {
      font-family: var(--font-display);
      font-size: clamp(58px, 11vw, 114px);
      letter-spacing: 0.04em;
      line-height: 1;
      background: linear-gradient(130deg, var(--gem1) 0%, var(--gem2) 50%, var(--gem3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 28px rgba(0,240,255,.3));
      animation: pulse-logo 4s ease-in-out infinite;
    }
    @keyframes pulse-logo {
      0%,100% { filter: drop-shadow(0 0 28px rgba(0,240,255,.3)); }
      50%      { filter: drop-shadow(0 0 48px rgba(177,79,255,.5)); }
    }
    .logo-sub {
      font-size: clamp(11px, 2vw, 14px);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 10px;
    }
    .gem-deco {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 2px;
      transform: rotate(45deg);
      animation: float 3s ease-in-out infinite;
    }
    .gem-deco:nth-child(1) { background:var(--gem1); top:4px;  left:-24px; animation-delay:0s; }
    .gem-deco:nth-child(2) { background:var(--gem2); top:18px; right:-24px;animation-delay:.8s; }
    .gem-deco:nth-child(3) { background:var(--gem3); bottom:0; left:12px;  animation-delay:1.6s;}
    @keyframes float {
      0%,100% { transform:rotate(45deg) translateY(0); }
      50%      { transform:rotate(45deg) translateY(-6px); }
    }

    /* ── SECTION SPACING ── */
    .games-section { margin-bottom: 72px; }
    .android-icon  { background: linear-gradient(135deg,#1db954,#0a7a38); }
    .yandex-icon   { background: linear-gradient(135deg,#ff6900,#c93a00); }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="site-nav">
  <a class="nav-logo" href="index.html">Garry's Gems</a>
  <div class="nav-links">
    <a href="index.html#android">Mobile</a>
    <a href="index.html#yandex">Web</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="logo-wrap">
    <div class="gem-deco"></div>
    <div class="gem-deco"></div>
    <div class="gem-deco"></div>
    <div class="logo">Garry's Gems</div>
  </div>
  <p class="logo-sub">Indie Game Developer</p>
</div>

<main class="page-wrap">

  <!-- ANDROID -->
  <section class="games-section android-section reveal" id="android">
    <div class="section-header">
      <!-- <div class="section-icon android-icon">🤖</div> -->
      <h2 class="section-title">Mobile</h2>
      <div class="section-line"></div>
    </div>
    <div class="game-grid" id="android-grid"></div>
  </section>

  <!-- ЯНДЕКС -->
  <section class="games-section yandex-section reveal" id="yandex">
    <div class="section-header">
      <!-- <div class="section-icon yandex-icon">🎯</div> -->
      <!--<h2 class="section-title">Web</h2>
      <div class="section-line"></div>-->
    </div>
    <div class="game-grid" id="yandex-grid"></div>
  </section>

</main>

<footer class="site-footer">
  <!-- <div class="footer-links">
    <a href="terms.html">Terms of Use</a>
    <a href="privacy.html">Privacy Policy</a>
  </div> -->
  © 2026 <span>Garry's Gems</span> · All rights reversed
</footer>

<script src="main.js"></script>
<script>
/* ── GAME DATA ──
   icon:  путь к картинке (png/jpg/webp)
   Замените "images/gem-blaster.png" на реальные пути к иконкам.
   Ссылка ведёт на страницу описания игры.
*/
const androidGames = [
  { name: "Country Colors Quiz",   icon: "country-colors-quiz/flagquiz_icon.png",  url: "country-colors-quiz/game.html"  },
  { name: "Maestro Millionaire Quiz",   icon: "maestro-millionaire-quiz/playstore-icon.png",  url: "maestro-millionaire-quiz/game.html"  },
  { name: "Panda Ken Throwing Shuriken",    icon: "panda-ken-throwing-shuriken/pandaken.png",   url: "panda-ken-throwing-shuriken/game.html"   }
];

const yandexGames = [
 /* { name: "Crystal Drop",  icon: "images/icon-crystal-drop.png", url: "game.html?id=crystal-drop" },
  { name: "Dungeon Keys",  icon: "images/icon-dungeon-keys.png", url: "game.html?id=dungeon-keys" },
  { name: "Star Catcher",  icon: "images/icon-star-catcher.png", url: "game.html?id=star-catcher" },
  { name: "Block Party",   icon: "images/icon-block-party.png",  url: "game.html?id=block-party"  },*/
];

function renderGames(games, containerId) {
  const grid = document.getElementById(containerId);
  games.forEach(g => {
    const a = document.createElement('a');
    a.href = g.url;
    a.className = 'game-card';

    // иконка — картинка, при ошибке показываем заглушку
    a.innerHTML = `
      <img class="game-icon-img" src="${g.icon}" alt="${g.name}"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="game-icon-placeholder" style="display:none;">🎮</div>
      <div class="game-name">${g.name}</div>
      <div class="game-badge">About →</div>
    `;
    grid.appendChild(a);
  });
}

renderGames(androidGames, 'android-grid');
renderGames(yandexGames,  'yandex-grid');
</script>
</body>
</html>
